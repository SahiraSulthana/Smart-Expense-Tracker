<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
  <h2>Smart Expense Tracker</h2>

  <div class="balance-card">
    <p>Total Balance</p>
    <h3>₹ <span id="balance">0</span></h3>
  </div>

  <div class="summary">
    <div>
      <p>Income</p>
      <h4 class="income">₹ <span id="income">0</span></h4>
    </div>
    <div>
      <p>Expense</p>
      <h4 class="expense">₹ <span id="expense">0</span></h4>
    </div>
  </div>

  <form id="form">
    <input type="text" id="text" placeholder="Enter description" required>
    <input type="number" id="amount" placeholder="Enter amount (+income / -expense)" required>
    <button>Add Transaction</button>
  </form>

  <ul id="list"></ul>
  </div>
<script src="script.js"></script>
</body>
</html>
