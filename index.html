<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Expense Tracker</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 420px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 25px;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.balance-card {
  background: rgba(255,255,255,0.2);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  margin-bottom: 20px;
}

.balance-card h3 {
  font-size: 24px;
}

.summary {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.summary div {
  width: 48%;
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

.income {
  color: #00ff99;
}

.expense {
  color: #ff4d6d;
}

form input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #00c6ff;
  border: none;
  border-radius: 6px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

ul {
  list-style: none;
  margin-top: 15px;
  max-height: 150px;
  overflow-y: auto;
}

li {
  background: rgba(255,255,255,0.2);
  margin: 6px 0;
  padding: 8px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.delete {
  background: #ff4d6d;
  border: none;
  color: white;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Smart Expense Tracker</h2>

  <div class="balance-card">
    <p>Total Balance</p>
    <h3>₹ <span id="balance">0</span></h3>
  </div>

  <div class="summary">
    <div>
      <p>Income</p>
      <h4 class="income">₹ <span id="income">0</span></h4>
    </div>
    <div>
      <p>Expense</p>
      <h4 class="expense">₹ <span id="expense">0</span></h4>
    </div>
  </div>

  <form id="form">
    <input type="text" id="text" placeholder="Enter description" required>
    <input type="number" id="amount" placeholder="Enter amount (+income / -expense)" required>
    <button>Add Transaction</button>
  </form>

  <ul id="list"></ul>
</div>

<script>
const balance = document.getElementById("balance");
const income = document.getElementById("income");
const expense = document.getElementById("expense");
const list = document.getElementById("list");
const form = document.getElementById("form");
const text = document.getElementById("text");
const amount = document.getElementById("amount");

// Preloaded sample data
let transactions = JSON.parse(localStorage.getItem("transactions")) || [
  { text: "Salary", amount: 30000 },
  { text: "Groceries", amount: -2000 },
  { text: "Freelance", amount: 5000 }
];

function updateUI() {
  list.innerHTML = "";
  let total = 0;
  let inc = 0;
  let exp = 0;

  transactions.forEach((t, index) => {
    total += t.amount;

    if (t.amount > 0) inc += t.amount;
    else exp += t.amount;

    const li = document.createElement("li");
    li.innerHTML = `
      ${t.text} 
      <span>₹ ${t.amount}</span>
      <button class="delete" onclick="removeTransaction(${index})">X</button>
    `;
    list.appendChild(li);
  });

  balance.innerText = total;
  income.innerText = inc;
  expense.innerText = Math.abs(exp);

  localStorage.setItem("transactions", JSON.stringify(transactions));
}

function removeTransaction(index) {
  transactions.splice(index, 1);
  updateUI();
}

form.addEventListener("submit", function(e) {
  e.preventDefault();

  transactions.push({
    text: text.value,
    amount: Number(amount.value)
  });

  text.value = "";
  amount.value = "";
  updateUI();
});

updateUI();
</script>

</body>
</html>
